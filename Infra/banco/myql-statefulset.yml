apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: banco

spec:
  serviceName: mysql
  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
        - name: mysql
          image: mysql:8.0

          args:
            - --default-authentication-plugin=mysql_native_password

          ports:
            - containerPort: 3306

          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "admin123"

            - name: MYSQL_DATABASE
              value: "Usuario"

            - name: MYSQL_USER
              value: "apiuser"

            - name: MYSQL_PASSWORD
              value: "admin123"

          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql

  volumeClaimTemplates:
    - metadata:
        name: mysql-data

      spec:
        accessModes:
          - ReadWriteOnce

        resources:
          requests:
            storage: 1Gi